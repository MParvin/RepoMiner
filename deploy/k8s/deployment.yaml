apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-builder-api
  labels:
    app: dataset-builder
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-builder
      component: api
  template:
    metadata:
      labels:
        app: dataset-builder
        component: api
    spec:
      containers:
        - name: api
          image: dataset-builder:latest
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: dataset-builder-secrets
                  key: api-key
            - name: REDIS_ADDR
              value: "dataset-builder-redis:6379"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dataset-builder-api
spec:
  selector:
    app: dataset-builder
    component: api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-builder-worker
  labels:
    app: dataset-builder
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dataset-builder
      component: worker
  template:
    metadata:
      labels:
        app: dataset-builder
        component: worker
    spec:
      containers:
        - name: worker
          image: dataset-builder:latest
          command: ["dataset-worker"]
          env:
            - name: REDIS_ADDR
              value: "dataset-builder-redis:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-builder-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-builder-redis
  template:
    metadata:
      labels:
        app: dataset-builder-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: dataset-builder-redis
spec:
  selector:
    app: dataset-builder-redis
  ports:
    - port: 6379
      targetPort: 6379
