# RepoMiner Dataset Builder Configuration

source:
  type: github          # github | gitlab | gitea | localgit
  url: https://api.github.com
  token: ""             # API token for authenticated requests

analyzer:
  language: golang      # golang | python | rust (selects analyzer plugin)

storage:
  driver: sqlite
  path: data/dataset-builder.db

workspace:
  data_dir: data
  datasets_dir: datasets
  repos_dir: repos

queue:
  driver: redis

ranking:
  weights:
    agents_md: 30
    claude_md: 25
    cursor_dir: 15
    ai_commits: 10
    tests: 20
    ci: 15
    readme: 10
    docs: 10
    activity: 15
    maintainers: 10
