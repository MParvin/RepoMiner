# RepoMiner Dataset Builder Configuration

source:
  type: github
  url: https://api.github.com
  token: ""

analyzer:
  language: golang

storage:
  driver: sqlite
  path: data/dataset-builder.db

workspace:
  data_dir: data
  datasets_dir: datasets
  repos_dir: repos

queue:
  driver: memory

ranking:
  weights:
    agents_md: 30
    claude_md: 25
    cursor_dir: 15
    ai_commits: 10
    tests: 20
    ci: 15
    readme: 10
    docs: 10
    activity: 15
    maintainers: 10

llm:
  type: ollama
  base_url: http://localhost:11434
  model: mparvin/Supra-50M-f16:latest
  threshold: 6.0
