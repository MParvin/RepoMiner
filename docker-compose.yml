services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8081:8080"
    environment:
      - API_KEY=dev-api-key
      - REDIS_ADDR=redis:6379
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
      - ./repos:/app/repos
    command: ["dataset-api", "--addr", ":8080", "--api-key", "dev-api-key", "--redis", "redis:6379"]
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
      - ./repos:/app/repos
    command: ["dataset-worker", "--redis", "redis:6379"]
    depends_on:
      redis:
        condition: service_healthy
